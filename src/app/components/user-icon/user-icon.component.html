@if (this.authService.isLoggedIn()) {
  <div class="user-icon-logged-in relative group">
    <button class="flex items-center space-x-2 text-white hover:text-netflix-red transition-colors" (click)="showDropdown = !showDropdown" type="button">
      <div class="w-8 h-8 rounded bg-netflix-red flex items-center justify-center text-white">
        <span class="text-sm font-medium">{{ getUsername() | slice:0:1 | uppercase }}</span>
      </div>
      <span class="username font-medium">{{ getUsername() }}</span>
      <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
        <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd"></path>
      </svg>
    </button>
    @if (showDropdown) {
      <div class="dropdown-menu absolute right-0 mt-2 w-48 rounded-md shadow-lg bg-gray-800 ring-1 ring-gray-700 z-50">
        <button (click)="authService.logout()" class="dropdown-item block px-4 py-2 text-white hover:bg-netflix-red w-full text-left rounded-md transition-colors">
          Logout
        </button>
      </div>
    }
  </div>
} @else {
  <div class="user-icon-logged-out">
    <a routerLink="/login" class="flex items-center space-x-2 text-white hover:text-netflix-red transition-colors">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
      </svg>
      <span class="login-text font-medium">Sign In</span>
    </a>
  </div>
}

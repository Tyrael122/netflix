@if (poster_path()) {
  <img [ngSrc]="poster_path()!" width="300" height="450" alt="Movie poster" class="w-full h-64 object-cover hover:brightness-75 transition duration-300">
} @else {
  <div class="w-full h-64 bg-gray-800 rounded-lg flex items-center justify-center">
    <p class="text-gray-500">No poster available</p>
  </div>
}
